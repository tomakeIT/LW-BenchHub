# ===== 全局配置 =====
repo_root: /home/jialeng/LW-BenchHub

gpus: [7]        # 默认 GPU 分配顺序
port_base: 50000
host: 127.0.0.1
authkey: lightwheel

log_dir: multi_eval_logs

# Global model checkpoint for all parallel eval tasks.
# This overrides the `checkpoint` inside each task config when provided.
checkpoint: /home/jialeng/openpi/checkpoints/pi0_libero/pi0_6tasks_finetune/29999

enable_camera: true
debug_client_flow: true
debug_step_interval: 1

xla_preallocate_false: true

# Optional: override eval result root from task config.
# eval_result_dir: ./eval_result

# Optional: export rollout data for iterative training.
# When enabled, each rollout will be saved as:
#   <save_data_dir>/<task>/<task>_<timestamp>/
#       - isaac_replay_state.mp4
#       - dataset_success.hdf5 (or dataset_failed.hdf5)
save_data: false
save_data_dir: ./generated_episode_data
# 设为 false 可同时保留成功与失败轨迹（失败会输出 dataset_failed.hdf5）
save_data_only_success: false
save_data_video_name: isaac_replay_state.mp4
save_data_hdf5_success_name: dataset_success.hdf5
save_data_hdf5_failed_name: dataset_failed.hdf5

server_prefix: >
  source ~/miniconda3/etc/profile.d/conda.sh &&
  conda activate lw_benchhub &&
  export LoaderUserName="shaoze.yang" &&
  export LoaderToken="abcASD123!!" &&

client_prefix: >
  source ~/miniconda3/etc/profile.d/conda.sh &&
  conda activate openpi &&


# ===== 任务列表 =====
tasks:
  # task_name 可选；不填时会自动从 config 里的 env_cfg.task 推断。
  - task_name: ArrangeVegetables
    config: /home/jialeng/LW-BenchHub/policy/PI/eval_config/x7s_ArrangeVegetables.yml

